services:
  # ───────────────────────────────────────────────────────────────────────────
  # Frontend: Expo (React Native) — web + Metro bundler para device físico
  # ───────────────────────────────────────────────────────────────────────────
  #
  # ⚠️ Para o app no emulador Android (páginas de 16 KB) use o DEV BUILD nativo
  #    (`npx expo run:android`), não o Expo Go nem este container web. Ver EXECUTAR.md.
  #
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: patchmap-frontend
    working_dir: /app
    command: npm start
    ports:
      - '19000:19000' # Expo DevTools
      - '19006:19006' # Expo web
      - '8081:8081'   # Metro bundler
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=0.0.0.0
    networks:
      - patchmap-network
    stdin_open: true
    tty: true

  # ───────────────────────────────────────────────────────────────────────────
  # Backend (Django + DRF) e banco (PostgreSQL) foram migrados para o repo
  # próprio: https://github.com/MauriciostsDev/pathMapApi
  # Rode a API a partir de lá (o app aponta p/ http://10.0.2.2:8000 no emulador).
  # ───────────────────────────────────────────────────────────────────────────

networks:
  patchmap-network:
    driver: bridge
